<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear tu CV</title>
    <link rel="stylesheet" href="css/form-style.css">
</head>
<body>
<h1>Crea o Edita tu CV</h1>

<form action="#" method="post" th:action="@{/generate-cv}" th:object="${cvData}">
    <h2>Detalles Personales</h2>
    <div>
        <label for="firstName">Nombre:</label>
        <input type="text" id="firstName" th:field="*{personalDetails.firstName}" />
    </div>
    <div>
        <label for="lastName">Apellido:</label>
        <input type="text" id="lastName" th:field="*{personalDetails.lastName}" />
    </div>
    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{personalDetails.email}"  />
    </div>
    <div>
        <label for="phone">Teléfono:</label>
        <input type="text" id="phone" th:field="*{personalDetails.phone}"  />
    </div>
    <div>
        <label for="address">Dirección:</label>
        <input type="text" id="address" th:field="*{personalDetails.address}"  />
    </div>
    <div>
        <label for="city">Ciudad:</label>
        <input type="text" id="city" value="Mar del Plata" />
    </div>
    <div>
        <label for="province">Provincia:</label>
        <input type="text" id="province" value="Buenos Aires" />
    </div>
    <div>
        <label for="postalCode">Código Postal:</label>
        <input type="text" id="postalCode" value="7600" />
    </div>
    <div>
        <label for="professionalProfile">Perfil Profesional:</label>
        <textarea id="professionalProfile" rows="5">Desarrollador Full Stack con experiencia en Spring Boot y Angular.</textarea>
    </div>

    <hr/>

    <h2>Educación</h2>
    <div th:each="education, stat : ${cvData.educations}">
        <h3>Educación <span th:text="${stat.index + 1}"></span> </h3>
        <div>
            <label th:for="${'education_institution_' + stat.index}">Institución:</label>
            <input type="text" th:id="${'education_institution_' + stat.index}"  th:field="*{educations[__${stat.index }__].institution}"/>
        </div>
        <div>
            <label>Título:</label>
            <input type="text" th:field="*{educations[__${stat.index }__].degree}" />
        </div>
        <div>
            <label>Período:</label>
            <input type="text" th:field="*{educations[__${stat.index }__].period}" />
        </div>
        <div>
            <label>Descripción:</label>
            <textarea rows="3">Formación sólida en programación, redes y bases de datos.</textarea>
        </div>
        <hr th:if="${!stat.last}"/>
    </div>

    <hr/>

    <h2>Experiencia</h2>
    <div th:each="experience, stat : ${cvData.experiences}">
        <h3>Experiencia <span th:text="${stat.index + 1}"></span></h3>
        <div>
            <label>Puesto:</label>
            <input type="text" th:field="*{experiences[__${stat.index }__].jobTitle}" />
        </div>
        <div>
            <label>Empresa:</label>
            <input type="text" th:field="*{experiences[__${stat.index }__].company}" />
        </div>
        <div>
            <label>Período:</label>
            <input type="text" th:field="*{experiences[__${stat.index }__].period}" />
        </div>
        <div>
            <label>Descripción:</label>
            <textarea th:field="*{experiences[__${stat.index }__].description}" rows="3"></textarea>
        </div>

        <hr th:if="${!stat.last}"/>
    </div>

    <hr/>

    <h2>Habilidades</h2>
    <div th:each="skill, stat : ${cvData.skills}">
        <h3>Habilidad <span th:text="${stat.index + 1}"></span> </h3>
        <div>
            <label>Nombre:</label>
            <input type="text" th:field="*{skills[__${stat.index }__].name}" />
        </div>
        <div>
            <label>Nivel:</label>
            <input type="text" th:field="*{skills[__${stat.index }__].level}" />
        </div>
        <hr th:if="${!stat.last}"/>
    </div>

    <br/>
    <button type="submit">Generar/Actualizar CV</button>
</form>
</body>
</html>
